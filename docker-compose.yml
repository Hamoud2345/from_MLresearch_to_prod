# Local production-like stack: the prediction API + an MLflow tracking server.
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      PPF_MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./artifacts:/app/artifacts        # share the trained model with the host
    depends_on:
      - mlflow
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow

volumes:
  mlflow-data:
