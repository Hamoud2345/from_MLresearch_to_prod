name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Run tests with coverage
        run: pytest --cov=power_forecaster --cov-report=term-missing

      - name: Smoke-test the pipeline (train + backtest on synthetic data)
        env:
          PPF_HISTORY_DAYS: "400"
          PPF_TRAIN_WINDOW_DAYS: "180"
          PPF_TEST_WINDOW_DAYS: "30"
        run: |
          ppf backtest --model lightgbm
          ppf train --model lightgbm

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t power-price-forecaster:ci .
